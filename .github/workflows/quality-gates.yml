name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: firebelley/setup-godot@v1
        with:
          godot-version: 4.6.1
          use-dotnet: false

      - name: Run quality gates
        run: |
          chmod +x scripts/run-quality-gates.sh scripts/ci/*.sh
          ./scripts/run-quality-gates.sh
